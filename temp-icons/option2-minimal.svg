<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
  </defs>
  
  <!-- 圆角方形背景 -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#bg2)"/>
  
  <!-- 相机光圈线条 -->
  <g stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.3">
    <line x1="256" y1="56" x2="256" y2="136"/>
    <line x1="256" y1="456" x2="256" y2="376"/>
    <line x1="56" y1="256" x2="136" y2="256"/>
    <line x1="456" y1="256" x2="376" y2="256"/>
    <line x1="115" y1="115" x2="172" y2="172"/>
    <line x1="397" y1="397" x2="340" y2="340"/>
    <line x1="397" y1="115" x2="340" y2="172"/>
    <line x1="115" y1="397" x2="172" y2="340"/>
  </g>
  
  <!-- 小呆几何剪影 -->
  <g transform="translate(256, 250)">
    <!-- 身体 -->
    <ellipse cx="0" cy="60" rx="95" ry="85" fill="white"/>
    <!-- 头部 -->
    <circle cx="0" cy="-20" r="80" fill="white"/>
    <!-- 冠羽 -->
    <path d="M-30 -90 Q-40 -140 -10 -130 Q0 -100 0 -80" fill="white"/>
    <path d="M0 -100 Q0 -150 20 -135 Q15 -105 10 -85" fill="white"/>
    <path d="M30 -90 Q40 -140 10 -130 Q0 -100 0 -80" fill="white"/>
    
    <!-- 面部黄色区域 -->
    <ellipse cx="0" cy="-10" rx="55" ry="45" fill="#FCD34D"/>
    
    <!-- 腮红 -->
    <circle cx="-45" cy="0" r="14" fill="#F97316"/>
    <circle cx="45" cy="0" r="14" fill="#F97316"/>
    
    <!-- 眼睛 -->
    <circle cx="-28" cy="-25" r="10" fill="#1F2937"/>
    <circle cx="-24" cy="-30" r="3" fill="white"/>
    <circle cx="28" cy="-25" r="10" fill="#1F2937"/>
    <circle cx="32" cy="-30" r="3" fill="white"/>
    
    <!-- 喙 -->
    <path d="M-8 5 L0 25 L8 5 Z" fill="#9CA3AF"/>
  </g>
  
  <!-- 底部照片角标 -->
  <g transform="translate(340, 360) rotate(-8)">
    <rect x="0" y="0" width="90" height="100" rx="6" fill="white"/>
    <rect x="8" y="8" width="74" height="58" rx="3" fill="#E5E7EB"/>
    <circle cx="45" cy="37" r="14" fill="#F97316" opacity="0.4"/>
  </g>
</svg>